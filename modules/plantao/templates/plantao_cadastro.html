<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Plantão Pink Blue Vet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-pink-100 flex items-center justify-center p-4">

  <div class="w-full max-w-sm py-8">

    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🐾</div>
      <h1 class="text-xl font-bold text-pink-800">Cadastro de Plantonista</h1>
      <p class="text-pink-600 text-sm mt-1">Pink Blue Vet</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6 border border-pink-100">

      {% if erro %}
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 flex items-start gap-2">
        <span class="shrink-0 mt-0.5">⚠️</span>
        <span>{{ erro }}</span>
      </div>
      {% endif %}

      <form method="post" action="/plantao/cadastro" class="flex flex-col gap-4">

        <div>
          <label for="nome" class="block text-sm font-medium text-gray-700 mb-1">Nome completo *</label>
          <input id="nome" name="nome" type="text" required autocomplete="name"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="Dr. João Silva" />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail *</label>
          <input id="email" name="email" type="email" required autocomplete="email" inputmode="email"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="seu@email.com" />
        </div>

        <div>
          <label for="tipo" class="block text-sm font-medium text-gray-700 mb-1">Tipo *</label>
          <select id="tipo" name="tipo" required
            onchange="document.getElementById('campo-crmv').classList.toggle('hidden', this.value !== 'veterinario')"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition bg-white">
            <option value="">Selecione...</option>
            <option value="veterinario">Veterinário</option>
            <option value="auxiliar">Auxiliar Veterinário</option>
          </select>
        </div>

        <div id="campo-crmv" class="hidden">
          <label for="crmv" class="block text-sm font-medium text-gray-700 mb-1">CRMV *</label>
          <input id="crmv" name="crmv" type="text"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="SC-12345" />
        </div>

        <div>
          <label for="especialidade" class="block text-sm font-medium text-gray-700 mb-1">Especialidade</label>
          <input id="especialidade" name="especialidade" type="text"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="Clínica geral, cirurgia..." />
        </div>

        <div>
          <label for="telefone" class="block text-sm font-medium text-gray-700 mb-1">Telefone / WhatsApp</label>
          <input id="telefone" name="telefone" type="tel" inputmode="tel" autocomplete="tel"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="(48) 99999-9999" />
        </div>

        <div>
          <label for="senha" class="block text-sm font-medium text-gray-700 mb-1">Senha *</label>
          <input id="senha" name="senha" type="password" required autocomplete="new-password" minlength="8"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="Mínimo 8 caracteres" />
        </div>

        <div>
          <label for="senha_confirma" class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha *</label>
          <input id="senha_confirma" name="senha_confirma" type="password" required autocomplete="new-password"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="Repita a senha" />
        </div>

        <button type="submit"
          class="w-full bg-pink-700 hover:bg-pink-800 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors mt-1">
          Enviar cadastro
        </button>

      </form>
    </div>

    <p class="text-center text-xs text-pink-600 mt-4">
      Já tem conta?
      <a href="/plantao/login" class="font-semibold hover:underline">Entrar</a>
    </p>

  </div>

</body>
</html>
