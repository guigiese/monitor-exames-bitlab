<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha — Plantão Pink Blue Vet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-pink-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🔒</div>
      <h1 class="text-xl font-bold text-pink-800">Redefinir senha</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6 border border-pink-100">

      {% if erro %}
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 flex items-start gap-2">
        <span class="shrink-0 mt-0.5">⚠️</span>
        <span>{{ erro }}</span>
      </div>
      {% endif %}

      <form method="post" action="/plantao/senha/redefinir" class="flex flex-col gap-4">
        <input type="hidden" name="token" value="{{ token }}" />

        <div>
          <label for="nova_senha" class="block text-sm font-medium text-gray-700 mb-1">Nova senha *</label>
          <input id="nova_senha" name="nova_senha" type="password" required autocomplete="new-password" minlength="8"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="Mínimo 8 caracteres" />
        </div>

        <div>
          <label for="nova_senha_confirma" class="block text-sm font-medium text-gray-700 mb-1">Confirmar nova senha *</label>
          <input id="nova_senha_confirma" name="nova_senha_confirma" type="password" required autocomplete="new-password"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="Repita a nova senha" />
        </div>

        <button type="submit"
          class="w-full bg-pink-700 hover:bg-pink-800 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors">
          Redefinir senha
        </button>
      </form>

    </div>
  </div>
</body>
</html>
