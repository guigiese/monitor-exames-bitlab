<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar senha — Plantão Pink Blue Vet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-pink-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🔑</div>
      <h1 class="text-xl font-bold text-pink-800">Recuperar senha</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6 border border-pink-100">

      {% if enviado %}
      <div class="text-center py-4">
        <div class="text-4xl mb-3">✉️</div>
        <p class="text-gray-700 text-sm">
          Se houver uma conta com esse e-mail, você receberá um link para redefinir sua senha em breve.
        </p>
        <a href="/plantao/login" class="inline-block mt-4 text-pink-700 text-sm hover:underline">
          Voltar ao login
        </a>
      </div>
      {% else %}
      <p class="text-sm text-gray-600 mb-4">
        Informe seu e-mail cadastrado e enviaremos um link de redefinição de senha.
      </p>
      <form method="post" action="/plantao/senha/recuperar" class="flex flex-col gap-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input id="email" name="email" type="email" required inputmode="email" autocomplete="email"
            class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition"
            placeholder="seu@email.com" />
        </div>
        <button type="submit"
          class="w-full bg-pink-700 hover:bg-pink-800 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors">
          Enviar link
        </button>
      </form>
      <div class="mt-4 text-center">
        <a href="/plantao/login" class="text-xs text-pink-600 hover:underline">Voltar ao login</a>
      </div>
      {% endif %}

    </div>
  </div>
</body>
</html>
