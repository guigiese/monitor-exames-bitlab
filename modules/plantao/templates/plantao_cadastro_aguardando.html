<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aguardando aprovação — Plantão Pink Blue Vet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-pink-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm text-center">
    <div class="text-6xl mb-4">⏳</div>
    <h1 class="text-2xl font-bold text-pink-800 mb-2">Cadastro enviado!</h1>
    <p class="text-gray-600 text-sm mb-6">
      Seu cadastro foi recebido e está aguardando aprovação da clínica.
      Você receberá uma notificação assim que for aprovado.
    </p>
    <div class="bg-white rounded-xl p-4 border border-pink-100 shadow text-left text-sm text-gray-600 mb-6">
      <p class="font-medium text-gray-800 mb-2">O que acontece agora?</p>
      <ol class="list-decimal list-inside space-y-1">
        <li>A clínica revisa seu cadastro</li>
        <li>Você recebe um e-mail de aprovação</li>
        <li>Acesso liberado ao portal de plantão</li>
      </ol>
    </div>
    <a href="/plantao/login"
       class="inline-block bg-pink-700 hover:bg-pink-800 text-white font-semibold rounded-lg px-6 py-2.5 text-sm transition-colors">
      Voltar ao login
    </a>
  </div>
</body>
</html>
