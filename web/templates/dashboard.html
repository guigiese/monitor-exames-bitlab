{% extends "base.html" %}
{% block header %}Dashboard{% endblock %}
{% block content %}

<!-- Lab cards (auto-refresh 60s) -->
<div id="lab-counts"
     hx-get="/labmonitor/partials/lab_counts" hx-trigger="every 60s" hx-swap="innerHTML">
  {% include "partials/lab_counts.html" %}
</div>

<!-- Notifications feed -->
<div class="bg-white rounded-xl border shadow-sm p-5 mt-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-semibold text-gray-700">Últimas Notificações</h2>
    <span class="text-xs text-gray-400">atualiza a cada 30s</span>
  </div>
  <div id="notif-feed"
       hx-get="/labmonitor/partials/notifications" hx-trigger="every 30s" hx-swap="innerHTML">
    {% include "partials/notifications.html" %}
  </div>
</div>

{% endblock %}
