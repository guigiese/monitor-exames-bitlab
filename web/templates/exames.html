{% extends "base.html" %}
{% block header %}Exames{% endblock %}
{% block content %}

<!-- Filtros -->
<form class="flex flex-wrap gap-3 mb-5" method="get">
  <select name="lab" class="border rounded-lg px-3 py-2 text-sm bg-white">
    <option value="">Todos os labs</option>
    {% for l in labs_cfg %}
    <option value="{{ l.id }}" {% if lab_filter == l.id %}selected{% endif %}>{{ l.name }}</option>
    {% endfor %}
  </select>
  <select name="status" class="border rounded-lg px-3 py-2 text-sm bg-white">
    <option value="">Todos os status</option>
    {% for s in statuses %}
    <option value="{{ s }}" {% if status_filter == s %}selected{% endif %}>{{ s }}</option>
    {% endfor %}
  </select>
  <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">
    Filtrar
  </button>
  {% if lab_filter or status_filter %}
  <a href="/exames" class="px-4 py-2 rounded-lg text-sm border hover:bg-gray-50 text-gray-600">Limpar</a>
  {% endif %}
</form>

<!-- Tabela -->
<div class="bg-white rounded-xl border shadow-sm p-5"
     id="exames-table"
     hx-get="/partials/exames?lab={{ lab_filter }}&status={{ status_filter }}"
     hx-trigger="every 5m"
     hx-swap="innerHTML">
  {% include "partials/exames_table.html" %}
</div>

{% endblock %}
